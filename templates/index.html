<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Shapes Agent with Auth</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>🎨 LLM Shapes Agent</h1>
        
        <!-- Auth Section -->
        <div id="authSection" class="auth-section">
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>
            
            <div id="loginForm" class="auth-form active">
                <h2>Login</h2>
                <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
            
            <div id="registerForm" class="auth-form">
                <h2>Register</h2>
                <input type="text" id="registerUsername" placeholder="Username" autocomplete="off">
                <input type="password" id="registerPassword" placeholder="Password">
                <input type="password" id="registerPasswordConfirm" placeholder="Confirm Password">
                <button onclick="register()">Register</button>
            </div>
        </div>
        
        <!-- Main Content (hidden until authenticated) -->
        <div id="mainContent" class="main-content" style="display: none;">
            <div class="user-info">
                <span>Welcome, <strong id="usernameDisplay">User</strong>!</span>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </div>
            
            <div class="main-content">
                <div class="canvas-section">
                    <h2>Drawing Canvas</h2>
                    <canvas id="shapesCanvas" width="800" height="600"></canvas>
                    <div class="canvas-info">
                        <p>Shapes: <span id="shapeCount">0</span></p>
                        <button onclick="getStats()" class="stats-btn">View My Stats</button>
                        <button onclick="getSuggestions()" class="stats-btn">Get Suggestions</button>
                    </div>
                </div>
                
                <div class="chat-section">
                    <h2>Chat with Agent</h2>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message agent">
                            <div class="message-content">
                                Hello! Please login or register to start drawing shapes.
                            </div>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="messageInput" placeholder="Type your command..." autocomplete="off" disabled>
                        <button id="sendButton" disabled>Send</button>
                    </div>
                    <div class="quick-commands">
                        <button onclick="sendCommand('add red circle')" disabled>Add Red Circle</button>
                        <button onclick="sendCommand('add blue triangle')" disabled>Add Blue Triangle</button>
                        <button onclick="sendCommand('add green rectangle')" disabled>Add Green Rectangle</button>
                        <button onclick="sendCommand('clear')" disabled>Clear Canvas</button>
                        <button onclick="sendCommand('help')" disabled>Help</button>
                        <button onclick="sendCommand('my stats')" disabled>My Stats</button>
                    </div>
                    
                    <!-- Statistics Panel -->
                    <div id="statsPanel" class="stats-panel" style="display: none;">
                        <h3>My Shape Statistics</h3>
                        <div id="statsContent"></div>
                        <button onclick="closeStats()" class="close-btn">Close</button>
                    </div>
                    
                    <!-- Suggestions Panel -->
                    <div id="suggestionsPanel" class="suggestions-panel" style="display: none;">
                        <h3>Suggestions</h3>
                        <div id="suggestionsContent"></div>
                        <button onclick="closeSuggestions()" class="close-btn">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
